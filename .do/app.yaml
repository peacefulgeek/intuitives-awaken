name: intuitives-awaken
region: nyc
services:
  - name: web
    github:
      repo: peacefulgeek/intuitives-awaken
      branch: main
      deploy_on_push: true
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: node scripts/start-with-cron.mjs
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 60
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "3000"
        scope: RUN_TIME
      - key: AUTO_GEN_ENABLED
        value: "true"
        scope: RUN_TIME
      - key: AMAZON_TAG
        value: spankyspinola-20
        scope: RUN_TIME
      # DeepSeek V4-Pro via OpenAI-compatible API
      - key: OPENAI_API_KEY
        value: sk-82bdad0a1fd34987b73030504ae67080
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_BASE_URL
        value: "https://api.deepseek.com"
        scope: RUN_TIME
      - key: OPENAI_MODEL
        value: "deepseek-v4-pro"
        scope: RUN_TIME
      # Database
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      # Bunny CDN
      - key: BUNNY_STORAGE_ZONE
        value: intuitives-awaken
        scope: RUN_TIME
      - key: BUNNY_API_KEY
        value: "1eb8ae9c-45fd-4203-ad710a9a76d5-13d8-47a8"
        scope: RUN_TIME
      - key: BUNNY_PULL_ZONE_URL
        value: "https://intuitives-awaken.b-cdn.net"
        scope: RUN_TIME
